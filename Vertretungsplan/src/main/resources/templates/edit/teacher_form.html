<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Vertretungsplan | Lehrer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
</head>
<body>
<div class="container">
    <div class="row">
        <div class="col-lg-6 col-md-6 col-sm-6 container justify-content-center card">
            <h1 class="text-center">Krankschreiben</h1>
            <div class="card-body">
                <form th:action="@{/lehrer/krankschreiben/{id}(id=${user.id})}" th:object="${user}" method="POST">
                    <div class="form-group">
                        <label>Krankschreiben</label>

                        <div class="form-group">
                            <label>Wirst du heute anwesend sein?</label>
                            <select name="anwesend" th:field="*{anwesend}" class="form-control">
                                <option value="true">Ich werde heute anwesend sein</option>
                                <option value="false">Ich werde heute nicht anwesend sein</option>
                            </select>
                        </div>

                        <div class="box-footer">
                            <button type="submit" class="btn btn-primary">
                                Submit
                            </button>
                        </div>

                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
