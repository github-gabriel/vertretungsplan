<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Vertretungsplan | Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
</head>
<body>

<div class="container">
    
    <div class="row">
        <h1>Vertretungsplan</h1>
    </div>

    <div class="row">
        <div class="col-lg-3">

        </div>
    </div>

    <table class="table table-striped">

        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Aenderung Art</th>
            <th>Klasse</th>
            <th>Stunde</th>
            <th>Vertreter</th>
            <th>Fach</th>
            <th>Actions</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="vertretungsplan_eintrag: ${vertretungsplan_eintraege}">
            <td th:text="${vertretungsplan_eintrag.id}"></td>
            <td th:text="${vertretungsplan_eintrag.aenderung_art}"></td>
            <td th:text="${vertretungsplan_eintrag.klasse}"></td>
            <td th:text="${vertretungsplan_eintrag.stunde}"></td>
            <td th:text="${vertretungsplan_eintrag.vertreter}"></td>
            <td th:text="${vertretungsplan_eintrag.fach}"></td>
            <td>

            </td>
        </tr>
        </tbody>

    </table>

</div>

</body>
</html>
