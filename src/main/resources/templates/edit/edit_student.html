<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Vertretungsplan | Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
</head>
<body>
<div class="container">
    <div class="row">
        <div class="col-lg-6 col-md-6 col-sm-6 container justify-content-center card">
            <h1 class="text-center">Lehrer Bearbeiten</h1>
            <div class="card-body">
                <form th:action="@{/admin/schueler/{id}(id=${student.id})}" th:object="${student}" method="POST">
                    <div class="form-group">
                        <label>Schueler Name</label>

                        <div class="form-group">
                            <label>Schueler Rolle</label>
                            <input
                                    type="text"
                                    name="roles"
                                    th:field="*{roles}"
                                    class="form-control"
                                    placeholder="Rolle des Schuelers"
                            />
                        </div>

                        <div class="form-group">
                            <label>Schueler 'isEnabled'</label>
                            <select name="active" th:field="*{active}" class="form-control">
                                <option value="true">true</option>
                                <option value="false">false</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Schueler Klasse</label>
                            <input
                                    type="text"
                                    name="klasse"
                                    th:field="*{klasse}"
                                    class="form-control"
                                    placeholder="Klasse des Schuelers"
                            />
                        </div>

                        <div class="box-footer">
                            <button type="submit" class="btn btn-primary">
                                Submit
                            </button>
                        </div>

                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
